<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - EarnSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0d1117] text-white pb-24">

    <div class="p-6 text-center border-b border-gray-800">
        <div class="w-24 h-24 bg-gradient-to-tr from-emerald-600 to-green-400 rounded-full mx-auto mb-4 flex items-center justify-center text-3xl font-bold text-black shadow-[0_0_20px_rgba(16,185,129,0.2)]">
            A
        </div>
        <h1 class="text-2xl font-bold">Arman</h1>
        <p class="text-gray-400 text-sm italic">Member since 2026</p>
    </div>

    <div class="grid grid-cols-2 gap-4 p-6">
        <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800">
            <p class="text-gray-500 text-xs mb-1">Current Balance</p>
            <p class="text-xl font-bold text-emerald-500">$0.00</p>
        </div>
        <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800">
            <p class="text-gray-500 text-xs mb-1">Tasks Completed</p>
            <p class="text-xl font-bold text-blue-500">0</p>
        </div>
    </div>

    <div class="px-6 space-y-3">
        <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-wallet text-emerald-500"></i>
                <span>Withdraw Funds</span>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-sm"></i>
        </div>
        <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fas fa-history text-blue-500"></i>
                <span>Transaction History</span>
            </div>
            <i class="fas fa-chevron-right text-gray-600 text-sm"></i>
        </div>
        <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800 flex items-center justify-between text-red-400">
            <div class="flex items-center gap-4">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0d1117]/95 backdrop-blur-lg border-t border-gray-800 p-4 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Home</span>
        </a>
        <a href="explore.html" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-compass text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Explore</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-emerald-500">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Profile</span>
        </a>
    </nav>
<div style="width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#10b981,#047857);display:flex;align-items:center;justify-content:center;margin:0 auto;font-size:32px;font-weight:900;color:white;box-shadow:0 8px 24px rgba(16,185,129,0.4)" id="profileAvatar">💰</div>
<img id="userProfilePicture" src="" alt="User Profile" style="display:none; width:80px; height:80px; border-radius:50%; object-fit:cover; margin:0 auto; box-shadow:0 8px 24px rgba(16,185,129,0.4); border: 2px solid white;">
<div style="position:absolute;bottom:0;right:0;width:24px;height:24px;border-radius:50%;background:#10b981;display:flex;align-items:center;justify-content:center;cursor:pointer" onclick="changeAvatar()" id="avatarChangeButton">
  <i class="fa-solid fa-pen" style="font-size:10px;color:white"></i>
</div>

</body>
</html>
