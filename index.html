<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EarnSphere – Global Earning Directory</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
/* ===== PREMIUM PURPLE THEME ===== */
body {
  background: linear-gradient(135deg, #1a0033, #2d0066, #3b0080) !important;
  color: #f5f5f5;
  font-family: 'Segoe UI', system-ui, sans-serif;
  min-height: 100vh;
}

.card, .pcard, .profile-card, .inner-page {
  background: rgba(25, 0, 50, 0.95) !important;
  border: 1px solid rgba(180, 120, 255, 0.2) !important;
}

.header, .nav-bot {
  background: rgba(20, 0, 40, 0.98) !important;
  border-color: rgba(180, 120, 255, 0.2) !important;
}

/* POLICY PAGE STYLING */
.inner-page {
  position: fixed; inset: 0; z-index: 200; overflow-y: auto;
  transform: translateX(100%); transition: transform 0.35s ease;
  padding: 20px;
}
.inner-page.open { transform: translateX(0); }

.back-btn {
  background: rgba(255, 255, 255, 0.1);
  border: 1px solid rgba(255, 255, 255, 0.2);
  color: white; border-radius: 100px;
  padding: 8px 16px; cursor: pointer;
  margin-bottom: 20px; display: inline-flex; align-items: center; gap: 8px;
}

.lang-select {
  background: rgba(255, 255, 255, 0.1);
  color: white; border: 1px solid rgba(255, 255, 255, 0.2);
  padding: 5px; border-radius: 8px; outline: none;
}
</style>
</head>
<body>

<header class="header sticky top-0 z-50 p-4 flex justify-between items-center border-b">
  <div class="font-bold text-xl text-purple-400">EarnSphere</div>
  <div class="flex items-center gap-2" id="headerUserArea">
    </div>
</header>

<main class="p-4 pb-24">
  <h1 class="text-2xl font-bold mb-4">Welcome to EarnSphere</h1>
  <p class="text-gray-400 mb-6">Discover the best earning platforms.</p>
  
  <div class="flex gap-4 mb-8">
    <button onclick="openPolicy('privacy')" class="text-purple-400 underline">Privacy Policy</button>
    <button onclick="openPolicy('terms')" class="text-purple-400 underline">Terms & Conditions</button>
  </div>

  <div class="card p-6 rounded-2xl">
    <h3 class="font-bold mb-3">⭐ Rate This App</h3>
    <div class="flex gap-2 text-2xl mb-4">
      <span class="cursor-pointer" onclick="rate(1)">⭐</span>
      <span class="cursor-pointer" onclick="rate(2)">⭐</span>
      <span class="cursor-pointer" onclick="rate(3)">⭐</span>
      <span class="cursor-pointer" onclick="rate(4)">⭐</span>
      <span class="cursor-pointer" onclick="rate(5)">⭐</span>
    </div>
    <textarea id="reviewText" placeholder="Write feedback..." class="w-full bg-white/5 border border-white/10 rounded-xl p-3 outline-none"></textarea>
    <button onclick="submitReview()" class="mt-4 bg-purple-600 px-6 py-2 rounded-xl font-bold">Submit</button>
    <div id="reviewList" class="mt-4 space-y-2"></div>
  </div>
</main>

<div id="policyPage" class="inner-page">
  <div class="flex justify-between items-center mb-6">
    <button class="back-btn" onclick="closePolicy()">
      <i class="fa-solid fa-arrow-left"></i> Back
    </button>
    <select id="langToggle" class="lang-select" onchange="switchLang()">
      <option value="en">English</option>
      <option value="bn">বাংলা</option>
    </select>
  </div>
  <div id="policyContent" class="prose prose-invert max-w-none">
    </div>
</div>

<div id="loginScreen" class="fixed inset-0 z-[9999] bg-[#060d18] flex items-center justify-center p-4">
  <div class="card p-8 w-full max-w-sm text-center rounded-[28px] shadow-2xl">
    <h2 class="text-2xl font-black mb-2">Welcome! 👋</h2>
    <p class="text-sm text-gray-500 mb-8">Start your earning journey today.</p>
    
    <button onclick="loginWithGoogle()" class="w-full bg-white text-gray-900 py-3 rounded-xl font-bold flex items-center justify-center gap-3 mb-4 transition-transform active:scale-95">
      <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"> Continue with Google
    </button>

    <div class="flex items-center gap-3 mb-4">
      <div class="flex-1 h-[1px] bg-white/10"></div>
      <span class="text-xs text-gray-600">or</span>
      <div class="flex-1 h-[1px] bg-white/10"></div>
    </div>

    <button onclick="enterApp()" class="w-full bg-purple-600/20 text-purple-400 border border-purple-500/30 py-3 rounded-xl font-bold transition-transform active:scale-95">
      🚀 Explore as Guest
    </button>
  </div>
</div>

<script>
/* POLICY DATA */
const policies = {
  privacy: {
    en: <h1>Privacy Policy</h1><p>We respect your privacy. We collect data for AdSense optimization and to provide a better user experience.</p>,
    bn: <h1>গোপনীয়তা নীতি</h1><p>আমরা আপনার গোপনীয়তাকে সম্মান করি। আমরা AdSense অপ্টিমাইজেশানের জন্য ডেটা সংগ্রহ করি।</p>
  },
  terms: {
    en: <h1>Terms & Conditions</h1><p>By using this app, you agree to our terms of service and AdSense guidelines.</p>,
    bn: <h1>শর্তাবলী</h1><p>এই অ্যাপটি ব্যবহার করার মাধ্যমে আপনি আমাদের শর্তাবলীতে সম্মতি প্রদান করছেন।</p>
  }
};

let currentPolicyType = "privacy";

function openPolicy(type) {
  currentPolicyType = type;
  document.getElementById('policyPage').classList.add('open');
  renderPolicy();
}

function closePolicy() {
  document.getElementById('policyPage').classList.remove('open');
}

function switchLang() { renderPolicy(); }

function renderPolicy() {
  const lang = document.getElementById('langToggle').value;
  document.getElementById('policyContent').innerHTML = policies[currentPolicyType][lang];
}

/* RATING SYSTEM */
let selectedRating = 0;
function rate(n) { 
  selectedRating = n;
  alert(You selected ${n} stars!);
}

function submitReview() {
  const text = document.getElementById("reviewText").value;
  if(!text) return;
  const review = document.createElement('div');
  review.className = "bg-white/5 p-3 rounded-lg text-sm";
  review.innerHTML = <strong>Rating: ${selectedRating}⭐</strong><p>${text}</p>;
  document.getElementById('reviewList').prepend(review);
  document.getElementById("reviewText").value = "";
}

/* LOGIN & GUEST ACCESS */
function enterApp() {
  document.getElementById('loginScreen').style.opacity = '0';
  setTimeout(() => document.getElementById('loginScreen').style.display = 'none', 500);
  updateHeaderForGuest();
}

function updateHeaderForGuest() {
  document.getElementById('headerUserArea').innerHTML = `
    <button onclick="location.reload()" class="bg-purple-600/20 text-purple-400 border border-purple-500/30 px-3 py-1 rounded-lg text-xs font-bold">Login</button>
  `;
}

// Note: Replace with your actual Firebase login logic as seen in your config
function loginWithGoogle() {
  alert("Firebase Google Login Initialized...");
  enterApp();
}
</script>

</body>
</html>
