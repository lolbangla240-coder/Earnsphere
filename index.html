<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EarnSphere – Login</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;background:#060d18;color:#e8e8e8;display:flex;align-items:center;justify-content:center;overflow:hidden;}
.gridlines{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(16,185,129,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(16,185,129,0.04) 1px,transparent 1px);background-size:36px 36px;}
.login-card{background:rgba(12,22,42,0.97);border:1px solid rgba(255,255,255,0.08);border-radius:28px;padding:40px 32px;width:100%;max-width:380px;text-align:center;position:relative;z-index:2;box-shadow:0 32px 80px rgba(0,0,0,0.5);}
.google-btn{background:white;color:#1e293b;border:none;border-radius:14px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:12px;width:100%;transition:all 0.2s;box-shadow:0 4px 16px rgba(0,0,0,0.3);}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.4);}
.google-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,0.1);}
.divider span{font-size:12px;color:rgba(255,255,255,0.3);}
.gbtn{background:linear-gradient(135deg,#10b981,#047857);color:white;border:none;border-radius:14px;padding:14px 24px;font-size:15px;font-weight:700;cursor:pointer;width:100%;transition:all 0.2s;}
.gbtn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(16,185,129,0.4);}
.feature-pill{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:#10b981;border-radius:100px;padding:6px 14px;font-size:12px;font-weight:600;display:inline-flex;align-items:center;gap:6px;}
.pop-sym{position:fixed;pointer-events:none;font-weight:900;animation:popUp linear infinite;opacity:0;}
@keyframes popUp{0%{transform:translateY(0) scale(0.5);opacity:0;}15%{opacity:1;}70%{opacity:0.5;}100%{transform:translateY(-200px) scale(0.8);opacity:0;}}
.err-box{background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);color:#ef4444;border-radius:12px;padding:10px 14px;font-size:13px;margin-top:12px;display:none;}
@keyframes fadeIn{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.login-card{animation:fadeIn 0.4s ease;}
</style>
</head>
<body>
<div class="gridlines"></div>
<div id="popContainer" style="position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:1;"></div>

<div class="login-card">
  <!-- Logo -->
  <div style="display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:28px">
    <svg width="44" height="44" viewBox="0 0 38 38" style="filter:drop-shadow(0 0 10px rgba(16,185,129,0.6))">
      <defs><linearGradient id="lg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#10b981"/><stop offset="100%" stop-color="#047857"/></linearGradient></defs>
      <circle cx="19" cy="19" r="19" fill="url(#lg1)"/>
      <circle cx="19" cy="19" r="16" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none"/>
      <text x="19" y="26" text-anchor="middle" font-size="18" font-weight="900" fill="white" font-family="Arial">$</text>
      <circle cx="29" cy="10" r="5" fill="#f59e0b" stroke="white" stroke-width="1.5"/>
      <text x="29" y="14" text-anchor="middle" font-size="7" font-weight="900" fill="white">₿</text>
    </svg>
    <div>
      <div style="font-weight:900;font-size:24px;background:linear-gradient(135deg,#10b981,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent">EarnSphere</div>
      <div style="font-size:10px;color:rgba(255,255,255,0.35);letter-spacing:1.5px;text-transform:uppercase">Global Earning Directory</div>
    </div>
  </div>

  <!-- Feature pill -->
  <div style="margin-bottom:24px">
    <div class="feature-pill" style="margin:0 auto">
      <span style="width:6px;height:6px;border-radius:50%;background:#10b981;display:inline-block"></span>
      35+ Verified Earning Platforms
    </div>
  </div>

  <h2 style="font-size:22px;font-weight:900;margin-bottom:6px">Welcome Back! 👋</h2>
  <p style="font-size:13px;color:rgba(255,255,255,0.4);margin-bottom:28px;line-height:1.6">Sign in to save your platforms,<br>track progress & sync across devices</p>

  <!-- Google Login -->
  <button class="google-btn" id="googleBtn" onclick="signInWithGoogle()">
    <svg width="20" height="20" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Continue with Google
  </button>

  <div id="errBox" class="err-box">
    <i class="fa-solid fa-circle-exclamation" style="margin-right:6px"></i>
    <span id="errMsg">Login failed. Please try again.</span>
  </div>

  <div class="divider"><span>or</span></div>

  <!-- Guest Mode -->
  <button class="gbtn" onclick="continueAsGuest()" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);font-size:14px;">
    <i class="fa-solid fa-user-secret" style="margin-right:8px;color:#10b981"></i>Continue as Guest
  </button>
  <p style="font-size:11px;color:rgba(255,255,255,0.25);margin-top:10px">Guest mode data won't be saved to cloud</p>

  <!-- Features -->
  <div style="margin-top:28px;padding-top:20px;border-top:1px solid rgba(255,255,255,0.07)">
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px">
      <div style="text-align:center">
        <div style="font-size:20px;margin-bottom:4px">☁️</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.4);line-height:1.4">Cloud<br>Sync</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:20px;margin-bottom:4px">🔖</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.4);line-height:1.4">Save<br>Platforms</div>
      </div>
      <div style="text-align:center">
        <div style="font-size:20px;margin-bottom:4px">📊</div>
        <div style="font-size:10px;color:rgba(255,255,255,0.4);line-height:1.4">Track<br>Progress</div>
      </div>
    </div>
  </div>
</div>

<script>
// =============================================
// FIREBASE CONFIG — APNAR CONFIG PASTE KORUN
// Firebase Console → Project Settings → Your apps
// =============================================
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyBC7WxO_w5rp4BLD6rPjOk7t-DdFrEhdbg",
  authDomain: "earnsphere-arman.firebaseapp.com",
  projectId: "earnsphere-arman",
  storageBucket: "earnsphere-arman.appspot.com",
  messagingSenderId: "549119343166",
  appId: "1:549119343166:web:a17d7c6f3d7862769fef6f"
};

// Firebase config valid kina check
const FIREBASE_READY = FIREBASE_CONFIG.apiKey !== "AIzaSyBC7WxO_w5rp4BLD6rPjOk7t-DdFrEhdbg"

let auth, db;
if (FIREBASE_READY) {
  firebase.initializeApp(FIREBASE_CONFIG);
  auth = firebase.auth();
  db = firebase.firestore();
  // Already logged in check
  auth.onAuthStateChanged(user => {
    if(user) window.location.href = 'EarnSphere.html';
  });
}

// Popping symbols animation
const SYMS=['₿','$','💰','💵','🪙','€','💎'];
const PCOLORS=['#ffd700','#f59e0b','#10b981','#3b82f6','#8b5cf6'];
function spawnSym(){
  const c=document.getElementById('popContainer');if(!c)return;
  const el=document.createElement('div');el.className='pop-sym';
  const sz=14+Math.random()*20,left=5+Math.random()*88,dur=3+Math.random()*4,delay=Math.random()*2;
  const color=PCOLORS[Math.floor(Math.random()*PCOLORS.length)];
  el.style.cssText=`left:${left}%;bottom:0;font-size:${sz}px;color:${color};animation-duration:${dur}s;animation-delay:${delay}s;`;
  el.textContent=SYMS[Math.floor(Math.random()*SYMS.length)];
  c.appendChild(el);setTimeout(()=>el.remove(),(dur+delay)*1000+500);
}
for(let i=0;i<10;i++) setTimeout(()=>spawnSym(),i*500);
setInterval(spawnSym,900);

// Google Sign In
async function signInWithGoogle() {
  const btn = document.getElementById('googleBtn');
  const errBox = document.getElementById('errBox');
  errBox.style.display = 'none';

  // Firebase config nai — direct app e pathao
  if (!FIREBASE_READY) {
    sessionStorage.setItem('guestMode', 'true');
    window.location.href = 'EarnSphere.html';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin" style="margin-right:8px"></i>Signing in...';
  try {
    const provider = new firebase.auth.GoogleAuthProvider();
    const result = await auth.signInWithPopup(provider);
    const user = result.user;
    await db.collection('users').doc(user.uid).set({
      name: user.displayName, email: user.email, photo: user.photoURL,
      lastLogin: firebase.firestore.FieldValue.serverTimestamp(), uid: user.uid
    }, { merge: true });
    window.location.href = 'EarnSphere.html';
  } catch(error) {
    btn.disabled = false;
    btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg> Continue with Google`;
    let msg = 'Login failed. Please try again.';
    if(error.code==='auth/popup-blocked') msg='Popup blocked! Allow popups for this site.';
    if(error.code==='auth/cancelled-popup-request') msg='Login cancelled.';
    document.getElementById('errMsg').textContent = msg;
    errBox.style.display = 'block';
  }
}

// Guest Mode — direct redirect
function continueAsGuest() {
  sessionStorage.setItem('guestMode', 'true');
  window.location.href = 'EarnSphere.html';
}
</script>
</body>
</html>
