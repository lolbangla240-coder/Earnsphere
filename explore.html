<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore - EarnSphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0d1117] text-white pb-24">

    <div class="p-6">
        <h1 class="text-2xl font-bold mb-4">Explore Tasks</h1>
        
        <div class="relative mb-6">
            <i class="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-gray-500"></i>
            <input type="text" placeholder="Search for games or surveys..." 
                   class="w-full bg-[#161b22] border border-gray-800 rounded-2xl py-3 pl-12 pr-4 outline-none focus:border-emerald-500 transition">
        </div>

        <div class="flex gap-3 overflow-x-auto pb-2 mb-6 no-scrollbar">
            <button class="bg-emerald-600 px-6 py-2 rounded-full text-sm font-bold whitespace-nowrap">All</button>
            <button class="bg-[#161b22] border border-gray-800 px-6 py-2 rounded-full text-sm whitespace-nowrap">Surveys</button>
            <button class="bg-[#161b22] border border-gray-800 px-6 py-2 rounded-full text-sm whitespace-nowrap">Games</button>
            <button class="bg-[#161b22] border border-gray-800 px-6 py-2 rounded-full text-sm whitespace-nowrap">Offers</button>
        </div>

        <div class="grid gap-4">
            <div class="bg-[#161b22] p-4 rounded-2xl border border-gray-800 flex justify-between items-center">
                <div>
                    <h3 class="font-bold">Daily Check-in</h3>
                    <p class="text-xs text-gray-400">Earn 10 coins daily</p>
                </div>
                <button class="bg-emerald-600/20 text-emerald-500 px-4 py-1 rounded-lg text-sm font-bold">Claim</button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-[#0d1117]/95 backdrop-blur-lg border-t border-gray-800 p-4 flex justify-around items-center z-50">
        <a href="index.html" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Home</span>
        </a>
        <a href="explore.html" class="flex flex-col items-center text-emerald-500">
            <i class="fas fa-compass text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Explore</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center text-gray-500">
            <i class="fas fa-user text-xl"></i>
            <span class="text-[10px] mt-1 font-medium">Profile</span>
        </a>
    </nav>

</body>
</html>
